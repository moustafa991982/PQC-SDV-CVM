# /etc/pqc-sdv/nginx/nginx.conf
# One nginx config, three personalities via symlinks.

worker_processes 1;
events { worker_connections 256; }

http {
    log_format brief '$remote_addr "$request" $status $body_bytes_sent '
                     'tls=$ssl_protocol cipher=$ssl_cipher '
                     'group="$ssl_curve" server_alg="$ssl_server_name"';
    access_log /var/log/nginx/access.log brief;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 443 ssl;
        http2 on;
        server_name vcu-backend.local;

        # symlinks managed by nginx-switch.sh
        ssl_certificate     /etc/pqc-sdv/active/fullchain.pem;
        ssl_certificate_key /etc/pqc-sdv/active/leaf.key;

        ssl_protocols       TLSv1.3;
        ssl_ciphers         TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256;

        # Offer the hybrid group; OpenSSL 3.5 names it X25519MLKEM768.
        ssl_conf_command Groups X25519MLKEM768:x25519:secp256r1;

        location / {
            return 200 "pqc-sdv-cvm ok\n";
            add_header Content-Type text/plain always;
        }
    }
}
